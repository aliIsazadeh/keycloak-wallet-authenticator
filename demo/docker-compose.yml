services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.2
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      # Fat JAR built by :w3auth-keycloak-plugin:jar (BouncyCastle excluded, Keycloak supplies it)
      - ../w3auth-keycloak-plugin/build/libs/w3auth-keycloak-plugin-1.0.1.jar:/opt/keycloak/providers/w3auth-keycloak-plugin-1.0.1.jar:ro
      # Demo realm, auto-imported on startup via --import-realm
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
