name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Stage release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "w3auth-keycloak-plugin/build/libs/w3auth-keycloak-plugin-${VERSION}.jar" .
          sha256sum "w3auth-keycloak-plugin-${VERSION}.jar" > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "W3-Auth $GITHUB_REF_NAME" \
            --notes-file "docs/release-notes-${GITHUB_REF_NAME}.md" \
            "w3auth-keycloak-plugin-${VERSION}.jar" \
            "checksums-${VERSION}.txt"
