spring:
  application:
    name: wallet-auth
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/walletauth}
    username: ${POSTGRES_USER:walletauth}
    password: ${POSTGRES_PASSWORD:walletauth}
  jpa:
    hibernate:
      # No business entities exist yet; Flyway owns the schema, not Hibernate.
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

walletauth:
  challenge:
    domain: ${WALLETAUTH_DOMAIN:localhost}
    uri: ${WALLETAUTH_URI:http://localhost:8080}
    nonce-ttl: ${WALLETAUTH_NONCE_TTL:5m}
  jwt:
    # Base64-encoded 32-byte secret. LOCAL DEV ONLY — must be overridden in production via WALLETAUTH_JWT_SECRET.
    # Generate a production secret with: openssl rand -base64 32
    secret: ${WALLETAUTH_JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY=}
    ttl: ${WALLETAUTH_JWT_TTL:10m}
    audience: ${WALLETAUTH_JWT_AUDIENCE:wallet-auth}
  refresh:
    ttl: ${WALLETAUTH_REFRESH_TTL:30d}
  chain:
    rpc-url: ${WALLETAUTH_CHAIN_RPC_URL:http://localhost:8545}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
